services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flyf-web
    env_file:
      - .env
    environment:
      DB_SERVER: host.docker.internal
      DB_PORT: "61134"
      NEXT_PUBLIC_BASE_URL: http://localhost:3001
      NEXT_PUBLIC_APP_URL: http://localhost:3001
    ports:
      - "3001:3000"
    restart: unless-stopped
